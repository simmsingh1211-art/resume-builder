<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Resume Builder</title>
</head>
<body>
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center text-primary">Resume Builder 🚀</h2>

        <form action="/submit" method="post" enctype="multipart/form-data">
            <input class="form-control mb-2" type="text" name="name" placeholder="Enter Name">
            <input class="form-control mb-2" type="text" name="education" placeholder="Education">
            <input class="form-control mb-2" type="text" name="skills" placeholder="Skills">
            <input class="form-control mb-2" type="text" name="experience" placeholder="Experience">
            <input type="file" name="image" class="form-control mb-2">

            <button class="btn btn-primary w-100">Generate Resume</button>
        </form>
    </div>
</div>
</body>
</html>
