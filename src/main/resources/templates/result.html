<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .card {
            border-radius: 15px;
        }
        h1 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow-lg bg-dark text-white">

        <h1 class="text-center mb-4">🎉 Your Resume</h1>

        <hr>

        <p><strong>Name:</strong> <span th:text="${resume.name}"></span></p>
        <p><strong>Education:</strong> <span th:text="${resume.education}"></span></p>
        <p><strong>Skills:</strong> <span th:text="${resume.skills}"></span></p>
        <p><strong>Experience:</strong> <span th:text="${resume.experience}"></span></p>

        <div class="mt-4 text-center">
            <a th:href="@{/download(name=${resume.name}, education=${resume.education}, skills=${resume.skills}, experience=${resume.experience})}"
               class="btn btn-success me-2">⬇ Download PDF</a>

            <a href="/" class="btn btn-warning">🔄 Create Another</a>
        </div>

    </div>
</div>

</body>
</html>
